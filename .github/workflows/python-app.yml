# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      MY_DATABASE: ${{secrets.MY_DATABASE_KEY}}
      VARIABLE: ${{vars.VARIABLE}}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install ruff mypy
    - name: Lint with ruff
      run: ruff check InventarioAutos.py
    - name: Type check with mypy
      run: mypy --strict InventarioAutos.py
    - name: Ejecutando pruebas
      run: echo Ejecutanto secretos $MY_DATABASE_KEY
    - name: Ejecutando variable
      run: echo Ejecutanto  variable $VARIABLE
